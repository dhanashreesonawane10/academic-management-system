<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignments - CAMS</title>
    <link rel="stylesheet" href="{{url_for('static',filename='css/style.css')}}">
    <script src="{{ url_for('static', filename='js/script.js')}}" ></script>
</head>

<body>

    <header>
        <div>
            <h1>College Management System</h1>
            <p>Unified Portal for Students and Faculty</p>
        </div>

        <nav>
            <a href="javascript:history.back()"><- Back</a>
            <a href="/logout" class="logout-btn">Logout</a>
        </nav>
    </header>   

    <main>
        <div class="container">
            <a href="/faculty/dashboard" class="back-btn"><-Back to Dashboard</a>
            <div class="page-title">
                <h2>Manage Assignments</h2>
                <p>Create new assignments.</p>            
            </div>
            
            <section class="content-box">
                <h2>Create Assignment</h2>
                 <p style="color: lightseagreen;">
                    {{get_flashed_messages()[0] if get_flashed_messages() else " "}}
                </p>

        
                <form method="POST"enctype="multipart/form-data">
                    <label>Assignment Title</label><br>
                    <input type="text" name="title"  required><br><br>

                    <label>Description</label><br>
                    <textarea name="description"  rows="4" required></textarea><br><br>

                    <label>Due Date</label><br>
                    <input type="date" name="due_date" min="{{ today }} "  required><br><br>

                    <label>Upload Assigment File</label>
                    <input type="file" name="file" required       >

                    <button type="submit">Create Assignment</button>
                </form>
            </section>

            <div class="cards">
                <a href="/faculty/notice" class="card-link">
                    <div class="card">
                        Upload Notices
                    </div>
                </a>
                <a href="/faculty/submissions" class="card-link">
                    <div class="card">
                        View Submissions
                    </div>
                </a>
            </div>



        </div>
    </main>

    <footer>
        <p>&copy; 2026 College Portal</p>
    </footer>
    
</body>
</html>
